<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MedGuard AI Extension Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="options-shell">
      <section class="card">
        <h1>MedGuard AI EHR Push Options</h1>
        <p>
          Configure the MedGuard web app URL and an MVP API key placeholder.
          Production auth can swap this for a Supabase session token.
        </p>

        <label for="app-url">MedGuard web app URL</label>
        <input id="app-url" type="url" placeholder="http://localhost:3000" />

        <label for="api-key">MVP API key / Supabase token placeholder</label>
        <input id="api-key" type="password" placeholder="Paste test token" />

        <button id="save-button">Save Options</button>
        <a id="open-dashboard" href="http://localhost:3000/dashboard" target="_blank">
          Open MedGuard Dashboard
        </a>
        <p id="message" class="message"></p>
      </section>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
