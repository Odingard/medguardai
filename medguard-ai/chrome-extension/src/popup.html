<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MedGuard AI EHR Push</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <div class="logo">MG</div>
        <div>
          <h1>MedGuard AI</h1>
          <p>EHR Push</p>
        </div>
      </header>

      <section class="status-card">
        <span id="ehr-status" class="badge">Checking EHR...</span>
        <h2 id="patient-name">Elena Ramirez</h2>
        <p id="note-title">Latest SOAP note ready</p>
      </section>

      <button id="push-button" class="primary-button">Push to EHR</button>
      <button id="copy-button" class="secondary-button">Copy SOAP Note</button>
      <a id="open-app" class="link-button" href="http://localhost:3000/dashboard" target="_blank">
        Open MedGuard Dashboard
      </a>

      <p id="message" class="message">
        MVP mode copies or inserts formatted SOAP text. Review before signing.
      </p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
